# Шаблон Secret — замените все значения CHANGE_ME перед деплоем.
# Сгенерировать пароль: openssl rand -base64 24
# Сгенерировать PUSH_SECURITY_KEY (128 символов): cat /dev/urandom | tr -dc A-Za-z0-9 | head -c 128
apiVersion: v1
kind: Secret
metadata:
  name: bitrix
  namespace: bitrix
type: Opaque
stringData:
  POSTGRES_USER: "bitrix"
  POSTGRES_DB: "bitrix"
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  REDIS_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  PUSH_SECURITY_KEY: "CHANGE_ME_128_CHAR_RANDOM_KEY"
