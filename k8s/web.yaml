# Веб-под: 3 контейнера — nginx, php-fpm, memcached (sidecar).
# Memcached масштабируется 1:1 с подом; все экземпляры объединяются в кластер
# через headless Service "memcached-headless" (DNS возвращает все pod IP).

# --- ClusterIP Service для входящего веб-трафика (используется Ingress) ---
apiVersion: v1
kind: Service
metadata:
  name: bitrix-web
  namespace: bitrix
spec:
  selector:
    app: bitrix-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# --- Headless Service для memcached-кластера ---
# DNS-запрос "memcached-headless" возвращает A-записи всех pod IP на порту 11211.
# PHP memcache-расширение использует consistent hashing по этим IP.
apiVersion: v1
kind: Service
metadata:
  name: memcached-headless
  namespace: bitrix
spec:
  clusterIP: None
  selector:
    app: bitrix-web
  ports:
    - name: memcached
      port: 11211
      targetPort: 11211
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitrix-web
  namespace: bitrix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bitrix-web
  template:
    metadata:
      labels:
        app: bitrix-web
    spec:
      initContainers:
        # Скачивание Bitrix24 Enterprise (PostgreSQL) в корень сайта. flock на RWX — однократная распаковка при нескольких репликах.
        - name: fetch-portal-archive
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /opt/www
              L=/opt/www/.bootstrap-portal.lock
              M=/opt/www/.bitrix-portal-extracted
              (
                flock -x 200
                if [ -f "$M" ]; then exit 0; fi
                if [ -d /opt/www/bitrix ] && [ -n "$(ls -A /opt/www/bitrix 2>/dev/null || true)" ]; then
                  touch "$M"
                  exit 0
                fi
                apk add --no-cache ca-certificates curl tar gzip util-linux
                curl -fsSL "https://www.1c-bitrix.ru/download/portal/bitrix24_enterprise_postgresql_encode.tar.gz" -o /tmp/portal.tar.gz
                tar -xzf /tmp/portal.tar.gz -C /opt/www
                rm -f /tmp/portal.tar.gz
                touch "$M"
              ) 200>"$L"
          volumeMounts:
            - name: www-data
              mountPath: /opt/www
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 3Gi
        # initContainer устанавливает права для пользователя bitrix (uid=1000)
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/www
              chown -R 1000:1000 /opt/www
          volumeMounts:
            - name: www-data
              mountPath: /opt/www
          securityContext:
            runAsUser: 0

      containers:
        # --- nginx ---
        - name: nginx
          image: quay.io/bitrix24/nginx:1.28.2-v1-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: www-data
              mountPath: /opt/www
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi

        # --- php-fpm ---
        - name: php-fpm
          image: quay.io/bitrix24/php:8.2.30-fpm-v1-alpine
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: www-data
              mountPath: /opt/www
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/99-bitrix.ini
              subPath: 99-bitrix.ini
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bitrix
                  key: POSTGRES_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 1Gi

        # --- memcached sidecar ---
        # -m 256: лимит памяти в МБ; -t 4: рабочие потоки
        - name: memcached
          image: memcached:1.6.41-alpine
          ports:
            - containerPort: 11211
          args: ["-m", "256", "-t", "4", "-I", "64m"]
          readinessProbe:
            tcpSocket:
              port: 11211
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 280Mi
            limits:
              memory: 512Mi

      volumes:
        - name: www-data
          persistentVolumeClaim:
            claimName: bitrix-www
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: php-config
          configMap:
            name: php-config
