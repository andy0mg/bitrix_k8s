# nginx default.conf для Битрикс.
# Источник: confs/nginx/conf.d/default.conf из bitrix-tools/env-docker.
# PHP-FPM слушает на 127.0.0.1:9000 (оба контейнера в одном поде).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: bitrix
data:
  default.conf: |
    map $http_x_real_ip $real_ip_mapped {
        default $http_x_real_ip;
        ''      $remote_addr;
    }

    server {
        listen 80;
        server_name _;

        charset utf-8;
        root /opt/www;
        index index.php;

        client_max_body_size 1024m;
        client_body_buffer_size 4m;
        client_body_timeout 600;

        set_real_ip_from 0.0.0.0/0;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # Безопасность: запрет скрытых файлов и системных директорий
        location ~* /\. {
            deny all;
        }

        location ~* ^/(bitrix/modules|bitrix/php_interface|bitrix/tools|upload/support/not_image) {
            deny all;
        }

        # x-accel-redirect: быстрая отдача upload-файлов через nginx
        location ^~ /upload/ {
            internal;
            alias /opt/www/upload/;
        }

        # Составные страницы (composite)
        location ^~ /bitrix/html_pages/ {
            try_files $uri =404;
        }

        # Статические файлы с долгим кешем
        location ~* \.(css|js|gif|png|jpg|jpeg|ico|bmp|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
            access_log off;
        }

        # PHP-файлы
        location ~ [^/]\.php(/|$) {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
            include fastcgi_params;
        }

        # Битрикс URL-rewrite
        location / {
            try_files $uri $uri/ @bitrix;
        }

        location @bitrix {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root/bitrix/urlrewrite.php;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
            fastcgi_read_timeout 300;
            include fastcgi_params;
        }
    }
