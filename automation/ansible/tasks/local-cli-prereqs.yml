---
# Плеи addons/bitrix выполняются на localhost — нужны бинарники на этой же машине.
- name: Проверить helm в PATH
  ansible.builtin.shell: command -v helm
  args:
    executable: /bin/bash
  register: _helm_bin
  changed_when: false
  failed_when: false

- name: Проверить kubectl в PATH
  ansible.builtin.shell: command -v kubectl
  args:
    executable: /bin/bash
  register: _kubectl_bin
  changed_when: false
  failed_when: false

- name: Разрешённый путь к helm (обход symlinks)
  ansible.builtin.command:
    argv:
      - readlink
      - -f
      - "{{ _helm_bin.stdout | trim }}"
  register: _helm_readlink
  changed_when: false
  failed_when: false
  when: _helm_bin.rc == 0

- name: Helm из Snap не видит чарты в /root
  ansible.builtin.fail:
    msg: |
      Helm запускается из Snap ({{ (_helm_readlink.stdout | default(_helm_bin.stdout)) | trim }}).
      Из песочницы Snap часто нет доступа к /root/bitrix_k8s → ложная ошибка «Chart.yaml file is missing».

      Варианты:
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        # бинарь попадёт в /usr/local/bin — вне Snap

      или перенесите репозиторий: git clone … в /opt/bitrix_k8s и работайте оттуда.
  when:
    - _helm_bin.rc == 0
    - "'/snap/' in ((_helm_readlink.stdout | default('')) ~ (_helm_bin.stdout | default('')))"

- name: Нужны helm и kubectl на машине запуска ansible-playbook
  ansible.builtin.fail:
    msg: |
      Плей addons/bitrix идёт на localhost — здесь же должны быть в PATH helm и kubectl.
      Сейчас: helm={{ 'найден' if _helm_bin.rc == 0 else 'НЕТ' }}, kubectl={{ 'найден' if _kubectl_bin.rc == 0 else 'НЕТ' }}.

      Helm:
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      kubectl (Linux x86_64, от root):
        curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl && kubectl version --client

      Для ARM64 замените amd64 → arm64 в URL.
      Документация: https://kubernetes.io/docs/tasks/tools/
  when: _helm_bin.rc != 0 or _kubectl_bin.rc != 0
