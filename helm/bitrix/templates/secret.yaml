apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bitrix.secretName" . }}
  namespace: {{ include "bitrix.namespace" . }}
  labels:
    {{- include "bitrix.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDatabase | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  PUSH_SECURITY_KEY: {{ .Values.secrets.pushSecurityKey | quote }}
