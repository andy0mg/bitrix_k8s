{{- if .Values.certManager.createClusterIssuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name }}
spec:
  acme:
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.certManager.clusterIssuer.name }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.ingress.className | quote }}
{{- end }}
